name: DB Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Shared App DB environment to migrate
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  db-migrate:
    name: Run Drizzle DB migration
    runs-on: self-hosted
    environment:
      name: ${{ inputs.environment == 'staging' && 'Staging' || 'Production' }}
      url: ${{ inputs.environment == 'staging' && 'https://staging.coursetable.com' || 'https://coursetable.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: coursetable
          doppler-config: ${{ inputs.environment == 'staging' && 'prod_staging' || 'prod' }}
          inject-env-vars: true

      - name: Set DB_URL
        run: |
          if [ -z "${DB_URL}" ]; then
            echo "DB_URL=postgresql://${DB_USER}:${DB_ROOT_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}" >> $GITHUB_ENV
          fi

      - name: Run DB migration
        run: |
          # Run as the Actions user so bind-mounted node_modules stays deletable by checkout
          docker run --rm --network db \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e DB_URL="${DB_URL}" \
            -v "${{ github.workspace }}:/app" -w /app \
            oven/bun:latest \
            sh -c "bun install --frozen-lockfile && cd api && bun run db:migrate"
