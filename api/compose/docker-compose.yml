services:
  api:
    build:
      context: ../../
      dockerfile: ./api/Dockerfile
    image: coursetable/api:latest
    container_name: ${EXPRESS_HOST?EXPRESS_HOST}
    ports:
      - ${API_PORT?API_PORT}:${API_PORT?API_PORT}
    environment:
      API_PORT: ${API_PORT?API_PORT}
      CANNY_KEY: ${CANNY_KEY?CANNY_KEY}
      CHALLENGE_PASSWORD: ${CHALLENGE_PASSWORD?CHALLENGE_PASSWORD}
      DB_URL: postgresql://${DB_USER?DB_USER}:${DB_ROOT_PASSWORD?DB_ROOT_PASSWORD}@${DB_HOST?DB_HOST}:${DB_PORT?DB_PORT}/${DB_NAME?DB_NAME}
      FERRY_RELOAD_SECRET: ${FERRY_RELOAD_SECRET?FERRY_RELOAD_SECRET}
      FRONTEND_ENDPOINT: ${FRONTEND_ENDPOINT?FRONTEND_ENDPOINT}
      GRAPHQL_ENDPOINT: http://${GRAPHQL_ENGINE_HOST?GRAPHQL_ENGINE_HOST}:8080/v1/graphql
      HOSTED_AUTH_VALIDATION: ${HOSTED_AUTH_VALIDATION:-false}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET?HASURA_GRAPHQL_ADMIN_SECRET}
      REDIS_HOST: ${REDIS_HOST?REDIS_HOST}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN?SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT?SENTRY_ENVIRONMENT}
      SESSION_SECRET: ${SESSION_SECRET?SESSION_SECRET}
      VERIFICATION_EMAIL_FROM_ADDRESS: ${VERIFICATION_EMAIL_FROM_ADDRESS:-}
      VERIFICATION_EMAIL_CAPTURE_DIR: ${VERIFICATION_EMAIL_CAPTURE_DIR:-}
      VERIFICATION_EMAIL_PROVIDER: ${VERIFICATION_EMAIL_PROVIDER:-resend}
      VERIFICATION_EMAIL_SENDER_DOMAIN: ${VERIFICATION_EMAIL_SENDER_DOMAIN:-}
      VERIFICATION_REQUEST_COOLDOWN_SECONDS: ${VERIFICATION_REQUEST_COOLDOWN_SECONDS:-60}
      VERIFICATION_SOURCE_LIMIT: ${VERIFICATION_SOURCE_LIMIT:-5}
      VERIFICATION_SOURCE_WINDOW_SECONDS: ${VERIFICATION_SOURCE_WINDOW_SECONDS:-900}
      VERIFICATION_GLOBAL_LIMIT: ${VERIFICATION_GLOBAL_LIMIT:-100}
      VERIFICATION_GLOBAL_WINDOW_SECONDS: ${VERIFICATION_GLOBAL_WINDOW_SECONDS:-900}
      VERIFICATION_ATTEMPT_SOURCE_LIMIT: ${VERIFICATION_ATTEMPT_SOURCE_LIMIT:-20}
      VERIFICATION_ATTEMPT_SOURCE_WINDOW_SECONDS: ${VERIFICATION_ATTEMPT_SOURCE_WINDOW_SECONDS:-900}
      VERIFICATION_ATTEMPT_EMAIL_LIMIT: ${VERIFICATION_ATTEMPT_EMAIL_LIMIT:-5}
      VERIFICATION_ATTEMPT_EMAIL_WINDOW_SECONDS: ${VERIFICATION_ATTEMPT_EMAIL_WINDOW_SECONDS:-900}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
      YALIES_API_KEY: ${YALIES_API_KEY?YALIES_API_KEY}
    networks:
      - api

networks:
  api:
    name: ${API_NETWORK?API_NETWORK}
    driver: bridge
